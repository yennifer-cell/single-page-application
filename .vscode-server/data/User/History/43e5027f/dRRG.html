<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Wordly Dictionary SPA</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <h1>Wordly Dictionary</h1>

    <!-- Search Form -->
    <form id="search-form">
      <input type="text" id="search-input" placeholder="Enter a word..." required>
      <button type="submit">Search</button>
    </form>

    <!-- Error Message -->
    <div id="error-message" class="hidden"></div>

    <!-- Results Section -->
    <div id="results">
      <h2 id="word"></h2>
      <p id="phonetic"></p>
      <audio id="audio" controls class="hidden"></audio>
      <div id="definitions"></div>
      <div id="synonyms"></div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
